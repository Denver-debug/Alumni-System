<!-- Register Page - Simple Email/Password Registration -->
<div class="page-wrapper">
  <div class="auth-card">
    <!-- Header Section with Gradient -->
    <div class="auth-header">
      <div class="auth-logo">
        <img
          src="/assets/images/logo.png"
          alt="MINSU Alumni"
          onerror="
            this.style.display = 'none';
            this.nextElementSibling.style.display = 'flex';
          "
        />
        <span class="auth-logo-text" style="display: none">MINSU</span>
      </div>
      <h1 class="auth-title">Join Alumni Network</h1>
      <p class="auth-subtitle">Create your account in seconds</p>
    </div>

    <div class="auth-body">
      <!-- Error Alert -->
      <div
        id="registerError"
        class="alert alert-error mb-md"
        style="display: none"
      >
        <span id="registerErrorText"></span>
      </div>

      <!-- Success Alert -->
      <div
        id="registerSuccess"
        class="alert alert-success mb-md"
        style="display: none"
      >
        <span id="registerSuccessText"></span>
      </div>

      <!-- Register Form -->
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label" for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            class="auth-input"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="auth-input"
            placeholder="Enter your email"
            required
          />
          <div class="form-hint">
            We'll send a verification code to this email
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              class="auth-input"
              placeholder="Create a password"
              required
            />
            <button type="button" class="password-toggle" id="togglePassword">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="form-hint">
            At least 8 characters with uppercase, lowercase, number, and special
            character
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password_confirmation"
            >Confirm Password</label
          >
          <div class="input-password-wrapper">
            <input
              type="password"
              id="password_confirmation"
              name="password_confirmation"
              class="auth-input"
              placeholder="Confirm your password"
              required
            />
            <button
              type="button"
              class="password-toggle"
              id="toggleConfirmPassword"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-auth mt-md" id="registerBtn">
          Create Account
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or continue with</span>
      </div>

      <!-- Google Sign Up -->
      <button type="button" class="btn-google" id="googleRegisterBtn">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path
            fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          />
          <path
            fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
          />
          <path
            fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
          />
          <path
            fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
          />
        </svg>
        Sign up with Google
      </button>

      <!-- Login Link -->
      <p class="auth-toggle">
        Already have an account?
        <span class="auth-toggle-link" onclick="Router.navigate('/login')"
          >Sign In</span
        >
      </p>
    </div>
  </div>
</div>

<script>
  (function () {
    const form = Utils.$("#registerForm");
    const errorDiv = Utils.$("#registerError");
    const errorText = Utils.$("#registerErrorText");
    const successDiv = Utils.$("#registerSuccess");
    const successText = Utils.$("#registerSuccessText");
    const googleBtn = Utils.$("#googleRegisterBtn");

    // Password toggles
    const togglePassword = Utils.$("#togglePassword");
    const toggleConfirmPassword = Utils.$("#toggleConfirmPassword");
    const passwordInput = Utils.$("#password");
    const confirmPasswordInput = Utils.$("#password_confirmation");

    function togglePasswordVisibility(input, button) {
      const type = input.type === "password" ? "text" : "password";
      input.type = type;
      button.innerHTML =
        type === "password"
          ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
          : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
    }

    togglePassword.addEventListener("click", () =>
      togglePasswordVisibility(passwordInput, togglePassword),
    );
    toggleConfirmPassword.addEventListener("click", () =>
      togglePasswordVisibility(confirmPasswordInput, toggleConfirmPassword),
    );

    function showError(message) {
      errorText.textContent = message;
      errorDiv.style.display = "flex";
      successDiv.style.display = "none";
    }

    function showSuccess(message) {
      successText.textContent = message;
      successDiv.style.display = "flex";
      errorDiv.style.display = "none";
    }

    function hideAlerts() {
      errorDiv.style.display = "none";
      successDiv.style.display = "none";
    }

    // Form submission
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlerts();

      const name = Utils.$("#name").value.trim();
      const email = Utils.$("#email").value.trim();
      const password = passwordInput.value;
      const password_confirmation = confirmPasswordInput.value;

      // Validations
      if (!name || !email || !password || !password_confirmation) {
        showError("Please fill in all fields");
        return;
      }

      if (password !== password_confirmation) {
        showError("Passwords do not match");
        return;
      }

      if (password.length < 8) {
        showError("Password must be at least 8 characters");
        return;
      }

      Utils.setButtonLoading("#registerBtn", true);

      try {
        const response = await Auth.register({
          name,
          email,
          password,
          password_confirmation,
        });

        showSuccess(
          "Registration successful! Please check your email for verification code.",
        );

        // Store email for verification page
        sessionStorage.setItem("verify_email", email);

        // Redirect to verification after delay
        setTimeout(() => {
          Router.navigate("/verify-email");
        }, 2000);
      } catch (error) {
        showError(error.message || "Registration failed. Please try again.");
      } finally {
        Utils.setButtonLoading("#registerBtn", false);
      }
    });

    // Google Sign Up
    googleBtn.addEventListener("click", async () => {
      if (typeof firebase === "undefined") {
        showError("Google Sign-In is not configured");
        return;
      }

      Utils.setButtonLoading("#googleRegisterBtn", true);
      hideAlerts();

      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        const result = await firebase.auth().signInWithPopup(provider);
        const idToken = await result.user.getIdToken();

        const response = await Auth.googleLogin(idToken);

        Utils.success(
          response.data.isNewUser ? "Account created!" : "Welcome back!",
        );

        const user = response.data.user;

        // Check if profile is complete
        if (user.role === "alumni" && !response.data.profileComplete) {
          Router.navigate("/complete-profile");
        } else if (["admin", "system_admin"].includes(user.role)) {
          Router.navigate("/admin/dashboard");
        } else {
          Router.navigate("/dashboard");
        }
      } catch (error) {
        console.error("Google signup error:", error);
        showError(error.message || "Google sign-up failed");
      } finally {
        Utils.setButtonLoading("#googleRegisterBtn", false);
      }
    });
  })();
</script>
