<!-- Announcement Detail -->
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-md">
        <div class="avatar avatar-md bg-primary">
          <span id="sidebarInitials">A</span>
        </div>
        <div>
          <div class="font-medium text-white" id="sidebarName">Alumni</div>
          <div class="text-xs opacity-75" id="sidebarAlumniId">Loading...</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/dashboard" class="sidebar-link">Dashboard</a>
      <a href="#/announcements" class="sidebar-link active">Announcements</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <a href="#/announcements" class="btn btn-ghost btn-sm">← Back</a>
    </div>
    <div class="content-body">
      <div id="announcementDetail" class="card p-xl">
        <div class="loading-spinner">Loading...</div>
      </div>
    </div>
  </main>
</div>

<script>
  (function () {
    const user = Auth.user;
    if (user) {
      Utils.$("#sidebarName").textContent = user.name || "Alumni";
      Utils.$("#sidebarInitials").textContent = Auth.getInitials();
    }

    const id = Router.getParam("id");
    if (id) loadAnnouncement(id);

    async function loadAnnouncement(id) {
      try {
        const response = await API.get(`/announcements/${id}`);
        const item = response.data;

        Utils.$("#announcementDetail").innerHTML = `
        ${item.cover_image ? `<img src="${item.cover_image}" alt="" class="w-full h-64 object-cover rounded-lg mb-lg">` : ""}
        <h1 class="text-2xl font-bold mb-md">${Utils.escapeHtml(item.title)}</h1>
        <div class="text-sm text-muted mb-lg">
          Published: ${new Date(item.publish_date || item.created_at).toLocaleDateString()}
        </div>
        <div class="prose">${item.content}</div>
      `;
      } catch (error) {
        Utils.$("#announcementDetail").innerHTML =
          '<div class="alert alert-error">Announcement not found</div>';
      }
    }
  })();
</script>
