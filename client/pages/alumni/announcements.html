  <!-- Main Content -->
  <main class="main-content">
    <div class="content-header">
      <h1>Announcements</h1>
    </div>

    <div class="content-body">
      <div id="announcementsList" class="space-y-md">
        <div class="loading-spinner">Loading announcements...</div>
      </div>
    </div>
  </main>
</div>

<script>
  (function () {
    // Update sidebar user info
    const user = Auth.user;
    if (user) {
      Utils.$("#sidebarName").textContent = user.name || "Alumni";
      Utils.$("#sidebarAlumniId").textContent = user.alumni_id || "No ID";
      Utils.$("#sidebarInitials").textContent = Auth.getInitials();
    }

    // Load announcements
    loadAnnouncements();

    async function loadAnnouncements() {
      try {
        const response = await API.get("/announcements");
        const container = Utils.$("#announcementsList");

        if (!response.data || response.data.length === 0) {
          container.innerHTML =
            '<div class="card p-xl text-center text-secondary">No announcements yet.</div>';
          return;
        }

        container.innerHTML = response.data
          .map(
            (item) => `
        <div class="card p-lg cursor-pointer hover:shadow-lg transition" onclick="Router.navigate('/announcements/${item.id}')">
          <div class="flex items-start gap-md">
            ${item.cover_image ? `<img src="${item.cover_image}" alt="" class="w-24 h-24 rounded-lg object-cover">` : ""}
            <div class="flex-1">
              <div class="flex items-center gap-sm mb-xs">
                ${item.priority === "urgent" ? '<span class="badge badge-error">Urgent</span>' : ""}
                ${item.priority === "high" ? '<span class="badge badge-warning">Important</span>' : ""}
                ${item.is_pinned ? '<span class="badge badge-primary">Pinned</span>' : ""}
              </div>
              <h3 class="font-bold text-lg mb-xs">${Utils.escapeHtml(item.title)}</h3>
              <p class="text-secondary text-sm mb-sm">${Utils.escapeHtml(item.excerpt || "")}</p>
              <div class="text-xs text-muted">
                ${new Date(item.publish_date || item.created_at).toLocaleDateString()}
              </div>
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      } catch (error) {
        Utils.$("#announcementsList").innerHTML =
          '<div class="alert alert-error">Failed to load announcements</div>';
      }
    }
  })();
</script>
