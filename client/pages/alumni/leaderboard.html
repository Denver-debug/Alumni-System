<!-- Leaderboard -->
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-md">
        <div class="avatar avatar-md bg-primary">
          <span id="sidebarInitials">A</span>
        </div>
        <div>
          <div class="font-medium text-white" id="sidebarName">Alumni</div>
          <div class="text-xs opacity-75" id="sidebarAlumniId">Loading...</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/dashboard" class="sidebar-link">Dashboard</a>
      <a href="#/profile" class="sidebar-link">My Profile</a>
      <a href="#/events" class="sidebar-link">Events</a>
      <a href="#/announcements" class="sidebar-link">Announcements</a>
      <a href="#/messages" class="sidebar-link">Messages</a>
      <a href="#/leaderboard" class="sidebar-link active">Leaderboard</a>
      <a href="#/rewards" class="sidebar-link">Rewards</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link text-error" onclick="Auth.logout()">
        Logout
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <h1>🏆 Leaderboard</h1>
    </div>

    <div class="content-body">
      <!-- My Rank -->
      <div class="card p-lg mb-lg" id="myRank">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-md">
            <div class="avatar avatar-lg bg-primary">
              <span id="myInitials">?</span>
            </div>
            <div>
              <div class="font-bold" id="myName">Loading...</div>
              <div class="text-sm text-muted">
                Your Rank: <span id="myPosition">#-</span>
              </div>
            </div>
          </div>
          <div class="text-right">
            <div class="text-2xl font-bold text-primary" id="myPoints">0</div>
            <div class="text-sm text-muted">points</div>
          </div>
        </div>
      </div>

      <!-- Top Alumni -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Top Alumni</h2>
        </div>
        <div id="leaderboardList">
          <div class="loading-spinner p-xl">Loading leaderboard...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  (function () {
    const user = Auth.user;
    if (user) {
      Utils.$("#sidebarName").textContent = user.name || "Alumni";
      Utils.$("#sidebarInitials").textContent = Auth.getInitials();
      Utils.$("#myName").textContent = user.name || "You";
      Utils.$("#myInitials").textContent = Auth.getInitials();
    }

    loadLeaderboard();

    async function loadLeaderboard() {
      try {
        const response = await API.get("/gamification/leaderboard");
        const container = Utils.$("#leaderboardList");
        const data = response.data;

        // Find user's position
        const myIndex = data.findIndex((a) => a.user_id === user.id);
        if (myIndex >= 0) {
          Utils.$("#myPosition").textContent = `#${myIndex + 1}`;
          Utils.$("#myPoints").textContent = data[myIndex].total_points || 0;
        }

        if (!data || data.length === 0) {
          container.innerHTML =
            '<div class="p-xl text-center text-muted">No data yet</div>';
          return;
        }

        container.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th width="60">Rank</th>
              <th>Alumni</th>
              <th>Badge</th>
              <th class="text-right">Points</th>
            </tr>
          </thead>
          <tbody>
            ${data
              .slice(0, 50)
              .map(
                (alumni, index) => `
              <tr class="${alumni.user_id === user.id ? "bg-primary-50" : ""}">
                <td>
                  <span class="font-bold ${index < 3 ? "text-xl" : ""}">
                    ${index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : `#${index + 1}`}
                  </span>
                </td>
                <td>
                  <div class="flex items-center gap-sm">
                    <div class="avatar avatar-sm bg-primary">${(alumni.name || "?")[0].toUpperCase()}</div>
                    <span>${Utils.escapeHtml(alumni.name || "Alumni")}</span>
                  </div>
                </td>
                <td>
                  <span class="badge badge-${getBadgeColor(alumni.badge_level)}">${alumni.badge_level || "bronze"}</span>
                </td>
                <td class="text-right font-bold">${alumni.total_points || 0}</td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        </table>
      `;
      } catch (error) {
        Utils.$("#leaderboardList").innerHTML =
          '<div class="alert alert-error m-lg">Failed to load leaderboard</div>';
      }
    }

    function getBadgeColor(badge) {
      const colors = {
        bronze: "secondary",
        silver: "info",
        gold: "warning",
        platinum: "primary",
        diamond: "success",
      };
      return colors[badge] || "secondary";
    }
  })();
</script>
