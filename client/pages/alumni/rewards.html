<!-- Rewards -->
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-md">
        <div class="avatar avatar-md bg-primary">
          <span id="sidebarInitials">A</span>
        </div>
        <div>
          <div class="font-medium text-white" id="sidebarName">Alumni</div>
          <div class="text-xs opacity-75" id="sidebarAlumniId">Loading...</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/dashboard" class="sidebar-link">Dashboard</a>
      <a href="#/profile" class="sidebar-link">My Profile</a>
      <a href="#/events" class="sidebar-link">Events</a>
      <a href="#/announcements" class="sidebar-link">Announcements</a>
      <a href="#/messages" class="sidebar-link">Messages</a>
      <a href="#/leaderboard" class="sidebar-link">Leaderboard</a>
      <a href="#/rewards" class="sidebar-link active">Rewards</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link text-error" onclick="Auth.logout()">
        Logout
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <div>
        <h1>🎁 Rewards</h1>
        <p class="text-muted">Redeem your points for rewards</p>
      </div>
      <div class="flex items-center gap-md">
        <div class="card p-md">
          <div class="text-sm text-muted">Your Points</div>
          <div class="text-2xl font-bold text-primary" id="myPoints">0</div>
        </div>
      </div>
    </div>

    <div class="content-body">
      <!-- Available Rewards -->
      <div class="card mb-lg">
        <div class="card-header">
          <h2 class="card-title">Available Rewards</h2>
        </div>
        <div id="rewardsList" class="grid grid-cols-3 gap-lg p-lg">
          <div class="loading-spinner">Loading rewards...</div>
        </div>
      </div>

      <!-- My Redemptions -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">My Redemptions</h2>
        </div>
        <div id="redemptionsList">
          <div class="loading-spinner p-xl">Loading...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  (function () {
    const user = Auth.user;
    let userPoints = 0;

    if (user) {
      Utils.$("#sidebarName").textContent = user.name || "Alumni";
      Utils.$("#sidebarInitials").textContent = Auth.getInitials();
    }

    loadUserPoints();
    loadRewards();
    loadRedemptions();

    async function loadUserPoints() {
      try {
        const response = await API.get("/gamification/points");
        userPoints = response.data.total_points || 0;
        Utils.$("#myPoints").textContent = userPoints;
      } catch (error) {
        console.error("Failed to load points:", error);
      }
    }

    async function loadRewards() {
      try {
        const response = await API.get("/gamification/rewards");
        const container = Utils.$("#rewardsList");
        const rewards = response.data;

        if (!rewards || rewards.length === 0) {
          container.innerHTML =
            '<div class="text-center text-muted p-xl col-span-3">No rewards available</div>';
          return;
        }

        container.innerHTML = rewards
          .map(
            (reward) => `
        <div class="card p-lg text-center">
          <div class="text-4xl mb-md">${reward.icon || "🎁"}</div>
          <h3 class="font-bold mb-sm">${Utils.escapeHtml(reward.name)}</h3>
          <p class="text-sm text-muted mb-md">${Utils.escapeHtml(reward.description || "")}</p>
          <div class="text-lg font-bold text-primary mb-md">${reward.points_cost} pts</div>
          <div class="text-sm text-muted mb-md">${reward.quantity_available || "Unlimited"} available</div>
          <button class="btn btn-primary btn-sm w-full" 
                  onclick="redeemReward(${reward.id}, ${reward.points_cost})"
                  ${userPoints < reward.points_cost ? "disabled" : ""}>
            ${userPoints < reward.points_cost ? "Not enough points" : "Redeem"}
          </button>
        </div>
      `,
          )
          .join("");
      } catch (error) {
        Utils.$("#rewardsList").innerHTML =
          '<div class="alert alert-error">Failed to load rewards</div>';
      }
    }

    async function loadRedemptions() {
      try {
        const response = await API.get("/gamification/redemptions");
        const container = Utils.$("#redemptionsList");
        const redemptions = response.data;

        if (!redemptions || redemptions.length === 0) {
          container.innerHTML =
            '<div class="text-center text-muted p-xl">No redemptions yet</div>';
          return;
        }

        container.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Reward</th>
              <th>Points</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>
            ${redemptions
              .map(
                (r) => `
              <tr>
                <td>${Utils.escapeHtml(r.reward_name || "Reward")}</td>
                <td>${r.points_cost || 0}</td>
                <td><span class="badge badge-${r.status === "claimed" ? "success" : r.status === "approved" ? "primary" : "warning"}">${r.status}</span></td>
                <td>${new Date(r.created_at).toLocaleDateString()}</td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        </table>
      `;
      } catch (error) {
        Utils.$("#redemptionsList").innerHTML =
          '<div class="alert alert-error m-lg">Failed to load redemptions</div>';
      }
    }

    window.redeemReward = async function (rewardId, pointsCost) {
      if (userPoints < pointsCost) {
        Utils.error("Not enough points");
        return;
      }

      if (!confirm("Are you sure you want to redeem this reward?")) return;

      try {
        await API.post(`/gamification/rewards/${rewardId}/redeem`);
        Utils.success("Reward redeemed successfully!");
        loadUserPoints();
        loadRewards();
        loadRedemptions();
      } catch (error) {
        Utils.error(error.message || "Failed to redeem reward");
      }
    };
  })();
</script>
