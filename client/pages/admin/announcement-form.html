<!-- Admin Announcement Form -->
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-md">
        <div class="avatar avatar-md bg-primary"><span>A</span></div>
        <div>
          <div class="font-medium text-white">Admin</div>
          <div class="text-xs opacity-75">Administrator</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/admin/dashboard" class="sidebar-link">Dashboard</a>
      <a href="#/admin/alumni" class="sidebar-link">Alumni</a>
      <a href="#/admin/events" class="sidebar-link">Events</a>
      <a href="#/admin/announcements" class="sidebar-link active"
        >Announcements</a
      >
      <a href="#/admin/organization" class="sidebar-link">Organization</a>
      <a href="#/admin/form-builder" class="sidebar-link">Form Builder</a>
      <a href="#/admin/gamification" class="sidebar-link">Gamification</a>
      <a href="#/admin/settings" class="sidebar-link">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link text-error" onclick="Auth.logout()">
        Logout
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <a href="#/admin/announcements" class="btn btn-ghost btn-sm"
        >← Back to Announcements</a
      >
      <h1 id="pageTitle">Create Announcement</h1>
    </div>

    <div class="content-body">
      <form id="announcementForm" class="card p-xl">
        <div class="grid grid-cols-2 gap-lg">
          <div class="form-group col-span-2">
            <label class="form-label required">Title</label>
            <input type="text" name="title" class="form-input" required />
          </div>

          <div class="form-group col-span-2">
            <label class="form-label">Content</label>
            <textarea
              name="content"
              class="form-input"
              rows="8"
              placeholder="Write your announcement content here..."
            ></textarea>
          </div>

          <div class="form-group">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-input">
              <option value="normal">Normal</option>
              <option value="important">Important</option>
              <option value="urgent">Urgent</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Target Audience</label>
            <select
              name="target_type"
              class="form-input"
              onchange="toggleTargetSelect(this.value)"
            >
              <option value="all">All Alumni</option>
              <option value="college">Specific College</option>
              <option value="program">Specific Program</option>
              <option value="section">Specific Section</option>
            </select>
          </div>

          <div class="form-group" id="targetSelectField" style="display: none">
            <label class="form-label">Select Target</label>
            <select name="target_id" id="targetSelect" class="form-input">
              <option value="">Select...</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Publish Date</label>
            <input type="date" name="publish_date" class="form-input" />
          </div>

          <div class="form-group">
            <label class="form-label">Expire Date</label>
            <input type="date" name="expire_date" class="form-input" />
          </div>

          <div class="form-group">
            <label class="form-label">Status</label>
            <select name="status" class="form-input">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
              <option value="archived">Archived</option>
            </select>
          </div>

          <div class="form-group col-span-2">
            <label class="form-label">Cover Image URL</label>
            <input
              type="url"
              name="cover_image"
              class="form-input"
              placeholder="https://..."
            />
          </div>
        </div>

        <div class="flex gap-md mt-lg">
          <button type="submit" class="btn btn-primary">
            Save Announcement
          </button>
          <a href="#/admin/announcements" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  (function () {
    const form = Utils.$("#announcementForm");
    const announcementId = Router.getParam("id");
    const isEdit = !!announcementId;

    // Set default publish date to today
    form.elements.publish_date.value = new Date().toISOString().split("T")[0];

    if (isEdit) {
      Utils.$("#pageTitle").textContent = "Edit Announcement";
      loadAnnouncement(announcementId);
    }

    async function loadAnnouncement(id) {
      try {
        const response = await API.get(`/announcements/${id}`);
        const announcement = response.data;

        Object.keys(announcement).forEach((key) => {
          const input = form.elements[key];
          if (input) {
            if (key === "publish_date" || key === "expire_date") {
              input.value = announcement[key]
                ? announcement[key].split("T")[0]
                : "";
            } else {
              input.value = announcement[key] || "";
            }
          }
        });

        if (announcement.target_type !== "all") {
          toggleTargetSelect(announcement.target_type);
        }
      } catch (error) {
        Utils.error("Failed to load announcement");
      }
    }

    window.toggleTargetSelect = async function (type) {
      const field = Utils.$("#targetSelectField");
      const select = Utils.$("#targetSelect");

      if (type === "all") {
        field.style.display = "none";
        return;
      }

      field.style.display = "block";
      select.innerHTML = '<option value="">Loading...</option>';

      try {
        let endpoint;
        switch (type) {
          case "college":
            endpoint = "/organization/colleges";
            break;
          case "program":
            endpoint = "/organization/programs";
            break;
          case "section":
            endpoint = "/organization/sections";
            break;
          default:
            return;
        }

        const response = await API.get(endpoint);
        select.innerHTML = '<option value="">Select...</option>';
        response.data.forEach((item) => {
          select.innerHTML += `<option value="${item.id}">${Utils.escapeHtml(item.name)}</option>`;
        });
      } catch (error) {
        select.innerHTML = '<option value="">Failed to load</option>';
      }
    };

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const data = Object.fromEntries(formData);

      // Clear target_id if targeting all
      if (data.target_type === "all") {
        data.target_id = null;
      }

      try {
        if (isEdit) {
          await API.put(`/announcements/${announcementId}`, data);
          Utils.success("Announcement updated");
        } else {
          await API.post("/announcements", data);
          Utils.success("Announcement created");
        }
        Router.navigate("/admin/announcements");
      } catch (error) {
        Utils.error(error.message || "Failed to save announcement");
      }
    });
  })();
</script>
