<!-- Admin Users Management -->
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-md">
        <div class="avatar avatar-md bg-primary"><span>A</span></div>
        <div>
          <div class="font-medium text-white">Admin</div>
          <div class="text-xs opacity-75">Administrator</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/admin/dashboard" class="sidebar-link">Dashboard</a>
      <a href="#/admin/alumni" class="sidebar-link">Alumni</a>
      <a href="#/admin/events" class="sidebar-link">Events</a>
      <a href="#/admin/announcements" class="sidebar-link">Announcements</a>
      <a href="#/admin/organization" class="sidebar-link">Organization</a>
      <a href="#/admin/form-builder" class="sidebar-link">Form Builder</a>
      <a href="#/admin/gamification" class="sidebar-link">Gamification</a>
      <a href="#/admin/users" class="sidebar-link active">Users</a>
      <a href="#/admin/settings" class="sidebar-link">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link text-error" onclick="Auth.logout()">
        Logout
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <h1>User Management</h1>
      <button class="btn btn-primary" onclick="showAddAdminModal()">
        + Add Admin
      </button>
    </div>

    <div class="content-body">
      <!-- Tabs -->
      <div class="flex gap-sm mb-lg">
        <button
          class="btn btn-primary"
          id="tabAdmins"
          onclick="showTab('admins')"
        >
          Administrators
        </button>
        <button
          class="btn btn-ghost"
          id="tabAlumni"
          onclick="showTab('alumni')"
        >
          Alumni Users
        </button>
      </div>

      <!-- Users Table -->
      <div class="card">
        <div class="card-header">
          <div class="flex gap-md">
            <input
              type="text"
              id="searchInput"
              class="form-input"
              placeholder="Search users..."
              style="width: 300px"
            />
          </div>
        </div>
        <div id="usersTable">
          <div class="loading-spinner p-xl">Loading...</div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Add Admin Modal -->
<div id="addAdminModal" class="modal" style="display: none">
  <div class="modal-overlay" onclick="closeModal()"></div>
  <div class="modal-content card p-xl" style="max-width: 500px">
    <h2 class="text-xl font-bold mb-lg">Add Administrator</h2>
    <form id="addAdminForm">
      <div class="form-group">
        <label class="form-label required">Name</label>
        <input type="text" name="name" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label required">Email</label>
        <input type="email" name="email" class="form-input" required />
      </div>
      <div class="form-group">
        <label class="form-label required">Password</label>
        <input
          type="password"
          name="password"
          class="form-input"
          required
          minlength="8"
        />
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select name="role" class="form-input">
          <option value="admin">Admin</option>
          <option value="system_admin">System Admin</option>
        </select>
      </div>
      <div class="flex gap-md mt-lg">
        <button type="submit" class="btn btn-primary">Create Admin</button>
        <button type="button" class="btn btn-secondary" onclick="closeModal()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>

<style>
  .modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
  }
  .modal-content {
    position: relative;
    z-index: 1;
  }
</style>

<script>
  (function () {
    let currentTab = "admins";

    loadUsers();

    Utils.$("#searchInput").addEventListener(
      "input",
      Utils.debounce(loadUsers, 300),
    );

    window.showTab = function (tab) {
      currentTab = tab;
      Utils.$("#tabAdmins").className =
        tab === "admins" ? "btn btn-primary" : "btn btn-ghost";
      Utils.$("#tabAlumni").className =
        tab === "alumni" ? "btn btn-primary" : "btn btn-ghost";
      loadUsers();
    };

    async function loadUsers() {
      const search = Utils.$("#searchInput").value;
      const role = currentTab === "admins" ? "admin" : "alumni";

      try {
        const params = new URLSearchParams({ role, search });
        const response = await API.get(`/admin/users?${params}`);
        const users = response.data;
        const container = Utils.$("#usersTable");

        if (!users || users.length === 0) {
          container.innerHTML =
            '<div class="text-center text-muted p-xl">No users found</div>';
          return;
        }

        container.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Last Login</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${users
              .map(
                (user) => `
              <tr>
                <td>
                  <div class="flex items-center gap-sm">
                    <div class="avatar avatar-sm bg-primary">${(user.name || "?")[0].toUpperCase()}</div>
                    <span>${Utils.escapeHtml(user.name || "-")}</span>
                  </div>
                </td>
                <td>${Utils.escapeHtml(user.email)}</td>
                <td><span class="badge badge-${user.role === "system_admin" ? "error" : user.role === "admin" ? "primary" : "secondary"}">${user.role}</span></td>
                <td><span class="badge badge-${user.status === "active" ? "success" : "warning"}">${user.status || "pending"}</span></td>
                <td>${user.last_login ? new Date(user.last_login).toLocaleDateString() : "Never"}</td>
                <td>
                  <div class="flex gap-xs">
                    ${
                      user.status === "active"
                        ? `<button class="btn btn-xs btn-warning" onclick="toggleStatus(${user.id}, 'inactive')">Deactivate</button>`
                        : `<button class="btn btn-xs btn-success" onclick="toggleStatus(${user.id}, 'active')">Activate</button>`
                    }
                    <button class="btn btn-xs btn-ghost" onclick="resetPassword(${user.id})">Reset Pwd</button>
                    <button class="btn btn-xs btn-error" onclick="deleteUser(${user.id})">Delete</button>
                  </div>
                </td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        </table>
      `;
      } catch (error) {
        Utils.$("#usersTable").innerHTML =
          '<div class="alert alert-error m-lg">Failed to load users</div>';
      }
    }

    window.showAddAdminModal = function () {
      Utils.$("#addAdminModal").style.display = "flex";
    };

    window.closeModal = function () {
      Utils.$("#addAdminModal").style.display = "none";
    };

    Utils.$("#addAdminForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData);

      try {
        await API.post("/admin/users", data);
        Utils.success("Admin created");
        closeModal();
        e.target.reset();
        loadUsers();
      } catch (error) {
        Utils.error(error.message || "Failed to create admin");
      }
    });

    window.toggleStatus = async function (id, status) {
      try {
        await API.put(`/admin/users/${id}`, { status });
        Utils.success("Status updated");
        loadUsers();
      } catch (error) {
        Utils.error(error.message || "Failed to update");
      }
    };

    window.resetPassword = async function (id) {
      if (!confirm("Send password reset email to this user?")) return;
      try {
        await API.post(`/admin/users/${id}/reset-password`);
        Utils.success("Reset email sent");
      } catch (error) {
        Utils.error(error.message || "Failed to send reset");
      }
    };

    window.deleteUser = async function (id) {
      if (
        !confirm(
          "Are you sure you want to delete this user? This cannot be undone.",
        )
      )
        return;
      try {
        await API.delete(`/admin/users/${id}`);
        Utils.success("User deleted");
        loadUsers();
      } catch (error) {
        Utils.error(error.message || "Failed to delete");
      }
    };
  })();
</script>
