<!-- Email Templates Settings -->
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-md">
        <div class="avatar avatar-md bg-primary"><span>A</span></div>
        <div>
          <div class="font-medium text-white">Admin</div>
          <div class="text-xs opacity-75">Administrator</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/admin/dashboard" class="sidebar-link">Dashboard</a>
      <a href="#/admin/alumni" class="sidebar-link">Alumni</a>
      <a href="#/admin/events" class="sidebar-link">Events</a>
      <a href="#/admin/announcements" class="sidebar-link">Announcements</a>
      <a href="#/admin/organization" class="sidebar-link">Organization</a>
      <a href="#/admin/form-builder" class="sidebar-link">Form Builder</a>
      <a href="#/admin/gamification" class="sidebar-link">Gamification</a>
      <a href="#/admin/settings" class="sidebar-link active">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link text-error" onclick="Auth.logout()">
        Logout
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <a href="#/admin/settings" class="btn btn-ghost btn-sm"
        >← Back to Settings</a
      >
      <h1>Email Templates</h1>
    </div>

    <div class="content-body">
      <div class="grid grid-cols-3 gap-lg">
        <!-- Template List -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Templates</h3>
          </div>
          <div id="templateList" class="p-md">
            <div class="loading-spinner">Loading...</div>
          </div>
        </div>

        <!-- Editor -->
        <div class="card col-span-2">
          <div class="card-header">
            <h3 class="card-title" id="editorTitle">Select a template</h3>
          </div>
          <form id="templateForm" class="p-lg" style="display: none">
            <div class="form-group">
              <label class="form-label">Subject</label>
              <input type="text" name="subject" class="form-input" required />
            </div>

            <div class="form-group">
              <label class="form-label">Body</label>
              <textarea
                name="body"
                class="form-input font-mono"
                rows="15"
                required
              ></textarea>
            </div>

            <div class="alert alert-info mb-lg">
              <strong>Available Variables:</strong>
              <div id="availableVars" class="mt-sm text-sm font-mono"></div>
            </div>

            <div class="flex gap-md">
              <button type="submit" class="btn btn-primary">
                Save Template
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                onclick="previewTemplate()"
              >
                Preview
              </button>
              <button
                type="button"
                class="btn btn-ghost"
                onclick="resetTemplate()"
              >
                Reset to Default
              </button>
            </div>
          </form>
          <div id="noTemplate" class="p-xl text-center text-muted">
            Select a template from the list to edit
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="modal" style="display: none">
  <div class="modal-overlay" onclick="closePreview()"></div>
  <div
    class="modal-content card"
    style="max-width: 700px; max-height: 80vh; overflow: auto"
  >
    <div class="card-header">
      <h3 class="card-title">Email Preview</h3>
      <button class="btn btn-ghost btn-sm" onclick="closePreview()">×</button>
    </div>
    <div class="p-lg" id="previewContent"></div>
  </div>
</div>

<style>
  .modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
  }
  .modal-content {
    position: relative;
    z-index: 1;
    width: 100%;
  }
  .template-item {
    padding: 0.75rem 1rem;
    cursor: pointer;
    border-bottom: 1px solid var(--gray-200);
    transition: background 0.2s;
  }
  .template-item:hover {
    background: var(--gray-50);
  }
  .template-item.active {
    background: var(--primary-50);
    border-left: 3px solid var(--primary);
  }
</style>

<script>
  (function () {
    let currentTemplate = null;

    const templates = [
      {
        id: "verification",
        name: "Email Verification",
        vars: ["{{name}}", "{{code}}", "{{expiry}}"],
      },
      {
        id: "password_reset",
        name: "Password Reset",
        vars: ["{{name}}", "{{code}}", "{{expiry}}"],
      },
      {
        id: "welcome",
        name: "Welcome Email",
        vars: ["{{name}}", "{{alumni_id}}", "{{login_url}}"],
      },
      {
        id: "event_reminder",
        name: "Event Reminder",
        vars: [
          "{{name}}",
          "{{event_title}}",
          "{{event_date}}",
          "{{event_location}}",
        ],
      },
      {
        id: "event_registration",
        name: "Event Registration",
        vars: ["{{name}}", "{{event_title}}", "{{event_date}}"],
      },
      {
        id: "points_earned",
        name: "Points Earned",
        vars: ["{{name}}", "{{points}}", "{{activity}}", "{{total_points}}"],
      },
      {
        id: "announcement",
        name: "New Announcement",
        vars: [
          "{{name}}",
          "{{announcement_title}}",
          "{{announcement_excerpt}}",
        ],
      },
    ];

    // Render template list
    Utils.$("#templateList").innerHTML = templates
      .map(
        (t) => `
    <div class="template-item" data-id="${t.id}" onclick="selectTemplate('${t.id}')">
      ${t.name}
    </div>
  `,
      )
      .join("");

    window.selectTemplate = async function (id) {
      currentTemplate = templates.find((t) => t.id === id);

      // Update UI
      document
        .querySelectorAll(".template-item")
        .forEach((el) => el.classList.remove("active"));
      document.querySelector(`[data-id="${id}"]`).classList.add("active");

      Utils.$("#editorTitle").textContent = currentTemplate.name;
      Utils.$("#availableVars").textContent = currentTemplate.vars.join(", ");
      Utils.$("#templateForm").style.display = "block";
      Utils.$("#noTemplate").style.display = "none";

      // Load template data
      try {
        const response = await API.get(`/settings/email-templates/${id}`);
        const data = response.data;

        Utils.$('[name="subject"]').value = data.subject || "";
        Utils.$('[name="body"]').value = data.body || "";
      } catch (error) {
        // Template might not exist yet, use defaults
        Utils.$('[name="subject"]').value = getDefaultSubject(id);
        Utils.$('[name="body"]').value = getDefaultBody(id);
      }
    };

    function getDefaultSubject(id) {
      const subjects = {
        verification: "Verify Your Email - MINSU Alumni",
        password_reset: "Reset Your Password - MINSU Alumni",
        welcome: "Welcome to MINSU Alumni Portal!",
        event_reminder: "Reminder: {{event_title}} is Coming Up!",
        event_registration: "Event Registration Confirmed",
        points_earned: "You Earned {{points}} Points!",
        announcement: "New Announcement: {{announcement_title}}",
      };
      return subjects[id] || "";
    }

    function getDefaultBody(id) {
      const bodies = {
        verification: `Hello {{name}},

Your verification code is: {{code}}

This code will expire in {{expiry}} minutes.

If you didn't request this, please ignore this email.

Best regards,
MINSU Alumni Team`,
        password_reset: `Hello {{name}},

Your password reset code is: {{code}}

This code will expire in {{expiry}} minutes.

If you didn't request this, please ignore this email.

Best regards,
MINSU Alumni Team`,
        welcome: `Welcome {{name}}!

Your alumni account has been created successfully.

Your Alumni ID: {{alumni_id}}

Login here: {{login_url}}

Best regards,
MINSU Alumni Team`,
      };
      return bodies[id] || "";
    }

    Utils.$("#templateForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentTemplate) return;

      const data = {
        subject: Utils.$('[name="subject"]').value,
        body: Utils.$('[name="body"]').value,
      };

      try {
        await API.put(`/settings/email-templates/${currentTemplate.id}`, data);
        Utils.success("Template saved");
      } catch (error) {
        Utils.error(error.message || "Failed to save template");
      }
    });

    window.previewTemplate = function () {
      if (!currentTemplate) return;

      let subject = Utils.$('[name="subject"]').value;
      let body = Utils.$('[name="body"]').value;

      // Replace variables with sample data
      const sampleData = {
        "{{name}}": "John Doe",
        "{{code}}": "123456",
        "{{expiry}}": "10",
        "{{alumni_id}}": "ALM-2026-CCS-00001",
        "{{login_url}}": "https://alumni.minsu.edu.ph/login",
        "{{event_title}}": "Alumni Homecoming 2026",
        "{{event_date}}": "March 15, 2026",
        "{{event_location}}": "MINSU Main Campus",
        "{{points}}": "50",
        "{{activity}}": "Event Attendance",
        "{{total_points}}": "250",
        "{{announcement_title}}": "Important Update",
        "{{announcement_excerpt}}": "Lorem ipsum dolor sit amet...",
      };

      Object.keys(sampleData).forEach((key) => {
        subject = subject.replace(
          new RegExp(key.replace(/[{}]/g, "\\$&"), "g"),
          sampleData[key],
        );
        body = body.replace(
          new RegExp(key.replace(/[{}]/g, "\\$&"), "g"),
          sampleData[key],
        );
      });

      Utils.$("#previewContent").innerHTML = `
      <div class="mb-lg">
        <strong>Subject:</strong> ${Utils.escapeHtml(subject)}
      </div>
      <hr class="mb-lg">
      <div style="white-space: pre-wrap;">${Utils.escapeHtml(body)}</div>
    `;
      Utils.$("#previewModal").style.display = "flex";
    };

    window.closePreview = function () {
      Utils.$("#previewModal").style.display = "none";
    };

    window.resetTemplate = function () {
      if (!currentTemplate) return;
      if (!confirm("Reset this template to default?")) return;

      Utils.$('[name="subject"]').value = getDefaultSubject(currentTemplate.id);
      Utils.$('[name="body"]').value = getDefaultBody(currentTemplate.id);
    };
  })();
</script>
