<!-- Admin Alumni List -->
<div class="dashboard-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-md">
        <div class="avatar avatar-md bg-primary"><span>A</span></div>
        <div>
          <div class="font-medium text-white">Admin</div>
          <div class="text-xs opacity-75">Administrator</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="#/admin/dashboard" class="sidebar-link">Dashboard</a>
      <a href="#/admin/alumni" class="sidebar-link active">Alumni</a>
      <a href="#/admin/events" class="sidebar-link">Events</a>
      <a href="#/admin/announcements" class="sidebar-link">Announcements</a>
      <a href="#/admin/organization" class="sidebar-link">Organization</a>
      <a href="#/admin/form-builder" class="sidebar-link">Form Builder</a>
      <a href="#/admin/gamification" class="sidebar-link">Gamification</a>
      <a href="#/admin/settings" class="sidebar-link">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button class="sidebar-link text-error" onclick="Auth.logout()">
        Logout
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-header">
      <h1>Alumni Management</h1>
      <button class="btn btn-primary" onclick="exportAlumni()">
        📥 Export CSV
      </button>
    </div>

    <div class="content-body">
      <!-- Filters -->
      <div class="card p-lg mb-lg">
        <div class="grid grid-cols-4 gap-md">
          <div class="form-group">
            <label class="form-label">Search</label>
            <input
              type="text"
              id="searchInput"
              class="form-input"
              placeholder="Name, email, ID..."
            />
          </div>
          <div class="form-group">
            <label class="form-label">College</label>
            <select id="filterCollege" class="form-input">
              <option value="">All Colleges</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Program</label>
            <select id="filterProgram" class="form-input">
              <option value="">All Programs</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Batch Year</label>
            <select id="filterBatch" class="form-input">
              <option value="">All Years</option>
            </select>
          </div>
        </div>
        <div class="flex gap-sm mt-md">
          <button class="btn btn-primary" onclick="applyFilters()">
            Apply Filters
          </button>
          <button class="btn btn-secondary" onclick="clearFilters()">
            Clear
          </button>
        </div>
      </div>

      <!-- Alumni Table -->
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Alumni List</h2>
          <span class="text-muted" id="totalCount">0 alumni</span>
        </div>
        <div id="alumniTable">
          <div class="loading-spinner p-xl">Loading...</div>
        </div>
        <div
          class="card-footer flex justify-between items-center"
          id="pagination"
        ></div>
      </div>
    </div>
  </main>
</div>

<script>
  (function () {
    let currentPage = 1;
    let filters = {};

    loadColleges();
    loadBatchYears();
    loadAlumni();

    async function loadColleges() {
      try {
        const response = await API.get("/organization/colleges");
        const select = Utils.$("#filterCollege");
        response.data.forEach((college) => {
          select.innerHTML += `<option value="${college.id}">${Utils.escapeHtml(college.name)}</option>`;
        });
      } catch (error) {
        console.error("Failed to load colleges:", error);
      }
    }

    async function loadBatchYears() {
      const select = Utils.$("#filterBatch");
      const currentYear = new Date().getFullYear();
      for (let year = currentYear; year >= currentYear - 20; year--) {
        select.innerHTML += `<option value="${year}">${year}</option>`;
      }
    }

    Utils.$("#filterCollege").addEventListener("change", async function () {
      const collegeId = this.value;
      const programSelect = Utils.$("#filterProgram");
      programSelect.innerHTML = '<option value="">All Programs</option>';

      if (collegeId) {
        try {
          const response = await API.get(
            `/organization/programs?college_id=${collegeId}`,
          );
          response.data.forEach((program) => {
            programSelect.innerHTML += `<option value="${program.id}">${Utils.escapeHtml(program.name)}</option>`;
          });
        } catch (error) {
          console.error("Failed to load programs:", error);
        }
      }
    });

    window.applyFilters = function () {
      filters = {
        search: Utils.$("#searchInput").value,
        college_id: Utils.$("#filterCollege").value,
        program_id: Utils.$("#filterProgram").value,
        batch_year: Utils.$("#filterBatch").value,
      };
      currentPage = 1;
      loadAlumni();
    };

    window.clearFilters = function () {
      Utils.$("#searchInput").value = "";
      Utils.$("#filterCollege").value = "";
      Utils.$("#filterProgram").innerHTML =
        '<option value="">All Programs</option>';
      Utils.$("#filterBatch").value = "";
      filters = {};
      currentPage = 1;
      loadAlumni();
    };

    async function loadAlumni() {
      try {
        const params = new URLSearchParams({
          page: currentPage,
          limit: 20,
          ...filters,
        });
        const response = await API.get(`/admin/alumni?${params}`);
        const container = Utils.$("#alumniTable");
        const alumni = response.data.data || response.data;
        const total = response.data.total || alumni.length;

        Utils.$("#totalCount").textContent = `${total} alumni`;

        if (!alumni || alumni.length === 0) {
          container.innerHTML =
            '<div class="text-center text-muted p-xl">No alumni found</div>';
          return;
        }

        container.innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>Alumni ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>College</th>
              <th>Program</th>
              <th>Batch</th>
              <th>Points</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${alumni
              .map(
                (a) => `
              <tr>
                <td><code>${a.alumni_id || "-"}</code></td>
                <td>${Utils.escapeHtml(a.name || "-")}</td>
                <td>${Utils.escapeHtml(a.email)}</td>
                <td>${Utils.escapeHtml(a.college_name || "-")}</td>
                <td>${Utils.escapeHtml(a.program_name || "-")}</td>
                <td>${a.batch_year || "-"}</td>
                <td>${a.total_points || 0}</td>
                <td><span class="badge badge-${a.status === "active" ? "success" : "warning"}">${a.status || "pending"}</span></td>
                <td>
                  <div class="flex gap-xs">
                    <a href="#/admin/alumni/${a.id}" class="btn btn-sm btn-ghost">View</a>
                    <button class="btn btn-sm btn-ghost text-error" onclick="deleteAlumni(${a.id})">Delete</button>
                  </div>
                </td>
              </tr>
            `,
              )
              .join("")}
          </tbody>
        </table>
      `;

        // Pagination
        const totalPages = Math.ceil(total / 20);
        Utils.$("#pagination").innerHTML = `
        <button class="btn btn-sm btn-ghost" onclick="goToPage(${currentPage - 1})" ${currentPage <= 1 ? "disabled" : ""}>Previous</button>
        <span>Page ${currentPage} of ${totalPages}</span>
        <button class="btn btn-sm btn-ghost" onclick="goToPage(${currentPage + 1})" ${currentPage >= totalPages ? "disabled" : ""}>Next</button>
      `;
      } catch (error) {
        Utils.$("#alumniTable").innerHTML =
          '<div class="alert alert-error m-lg">Failed to load alumni</div>';
      }
    }

    window.goToPage = function (page) {
      currentPage = page;
      loadAlumni();
    };

    window.deleteAlumni = async function (id) {
      if (!confirm("Are you sure you want to delete this alumni?")) return;
      try {
        await API.delete(`/admin/alumni/${id}`);
        Utils.success("Alumni deleted");
        loadAlumni();
      } catch (error) {
        Utils.error(error.message || "Failed to delete");
      }
    };

    window.exportAlumni = async function () {
      try {
        const params = new URLSearchParams(filters);
        const response = await API.get(`/admin/alumni/export?${params}`);

        // Create CSV download
        const blob = new Blob([response.data], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `alumni_export_${new Date().toISOString().split("T")[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (error) {
        Utils.error("Failed to export");
      }
    };
  })();
</script>
