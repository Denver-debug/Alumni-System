<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(100, 100)">
    <!-- Cap Top -->
    <polygon points="-50,-20 50,-20 60,-30 -60,-30" fill="#ffffff"/>
    <!-- Cap Base -->
    <rect x="-40" y="-20" width="80" height="15" fill="#ffffff" opacity="0.9"/>
    <!-- Tassel -->
    <line x1="50" y1="-30" x2="60" y2="-10" stroke="#ffffff" stroke-width="2"/>
    <circle cx="60" cy="-10" r="4" fill="#ffffff"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ffffff">
    ALUMNI
  </text>
  <text x="100" y="180" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#ffffff" opacity="0.9">
    SYSTEM
  </text>
</svg>
